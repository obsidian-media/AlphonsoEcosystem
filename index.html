<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Agent Desktop</title>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      #alphonso-boot-status {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #09090b;
        color: #f4f4f5;
        font: 600 13px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.04em;
        text-align: center;
        z-index: 9999;
      }
      #alphonso-boot-status[data-state="ready"] {
        display: none;
      }
      #alphonso-boot-status .panel {
        max-width: 36rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        padding: 18px 20px;
        background: rgba(24, 24, 27, 0.9);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      }
      #alphonso-boot-status .title {
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.24em;
        color: #a1a1aa;
        margin-bottom: 8px;
      }
      #alphonso-boot-status .message {
        font-size: 14px;
        color: #fafafa;
      }
      #alphonso-boot-status .detail {
        margin-top: 8px;
        font-size: 11px;
        color: #a1a1aa;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
    <script>
      window.__ALPHONSO_BOOT_READY__ = function () {
        var status = document.getElementById('alphonso-boot-status');
        if (status) status.dataset.state = 'ready';
      };
      window.__ALPHONSO_BOOT_ERROR__ = function (message, detail) {
        var status = document.getElementById('alphonso-boot-status');
        if (!status) return;
        status.dataset.state = 'error';
        status.innerHTML = '<div class="panel"><div class="title">Alphonso boot error</div><div class="message">' + message + '</div><div class="detail">' + detail + '</div></div>';
      };
      window.addEventListener('error', function (event) {
        var message = event && event.message ? String(event.message) : 'Unknown startup error.';
        var detail = event && event.error && event.error.stack ? String(event.error.stack) : (event && event.filename ? String(event.filename) : '');
        window.__ALPHONSO_BOOT_ERROR__(message, detail);
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event && event.reason ? event.reason : 'Unknown rejection.';
        var message = reason && reason.message ? String(reason.message) : String(reason);
        var detail = reason && reason.stack ? String(reason.stack) : '';
        window.__ALPHONSO_BOOT_ERROR__(message, detail);
      });
    </script>
  </head>
  <body class="bg-zinc-950">
    <div id="alphonso-boot-status"><div class="panel"><div class="title">Alphonso</div><div class="message">Launching native workspace...</div><div class="detail">If the UI fails to mount, this panel will show the startup error instead of leaving a blank window.</div></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
