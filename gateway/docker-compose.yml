services:
  whatsapp-cloud-gateway:
    build:
      context: ./whatsapp-cloud
      dockerfile: ../Dockerfile
    container_name: alphonso-whatsapp-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - ./whatsapp-cloud/.env
    environment:
      - PORT=8080
    volumes:
      - ./whatsapp-cloud/src:/app/src:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
