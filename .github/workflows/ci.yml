name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm)
        run: npm audit --audit-level=high

      - name: Lint check
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test

      - name: Check test coverage
        run: npm run test:coverage

      - name: Web build
        run: npm run build

      - name: Check bundle size
        shell: bash
        run: |
          TOTAL=$(du -sb dist/assets/ | awk '{print $1}')
          echo "Total bundle size: $TOTAL bytes"
          if [ "$TOTAL" -gt "10485760" ]; then
            echo "Bundle exceeds 10MB limit ($TOTAL bytes)"
            exit 1
          fi
          LARGEST=$(find dist/assets -name "*.js" -printf "%s\n" | sort -n | tail -1)
          if [ "$LARGEST" -gt "2097152" ]; then
            echo "Single JS chunk exceeds 2MB limit ($LARGEST bytes)"
            exit 1
          fi
          echo "Bundle size OK"

  rust-quality:
    name: Rust Tests & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Security audit (cargo)
        run: cargo install cargo-audit && cargo audit --file src-tauri/Cargo.lock --deny warnings
        continue-on-error: false

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Rust format check
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Rust coverage (tarpaulin)
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --manifest-path src-tauri/Cargo.toml --out Xml --output-dir coverage-rust
        continue-on-error: true



  desktop:
    name: Tauri Desktop Build
    needs: [test, rust-quality]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Alphonso-${{ github.sha }}-x64-setup
          path: src-tauri/target/release/bundle/nsis/Alphonso_*_x64-setup.exe
          retention-days: 14

  secrets-scan:
    name: Secrets Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  doc-freshness:
    name: Doc Count Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify doc counts are fresh
        run: npm run verify:docs

  e2e:
    name: Playwright E2E Smoke Test
    needs: [test]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    continue-on-error: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium


      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          CI: true

  gateway-health:
    name: Gateway Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Check Gateway health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://alphonsoecosystem-production-3ad1.up.railway.app/health || echo "Gateway health endpoint not reachable"
        continue-on-error: true

  ios-build:
    name: iOS Companion Build Check
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7
      - name: Build iOS companion
        run: |
          cd ios/AlphonsoCompanion
          xcodebuild -scheme AlphonsoCompanion -destination 'platform=iOS Simulator,name=iPhone 16' -quiet build 2>&1 | tail -20
        continue-on-error: true

