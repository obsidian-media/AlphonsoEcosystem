name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint check
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test

      - name: Check test coverage
        run: npm run test:coverage

      - name: Web build
        run: npm run build

      - name: Check bundle size
        shell: bash
        run: |
          find dist/assets -name "*.js" -size +1024k | grep . && echo "Bundle size exceeded 1MB limit" && exit 1 || echo "Bundle size OK"

  rust-quality:
    name: Rust Tests & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Security audit (cargo)
        run: cargo install cargo-audit && cargo audit --file src-tauri/Cargo.lock --deny warnings
        continue-on-error: false

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Rust format check
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  desktop:
    name: Tauri Desktop Build
    needs: [test, rust-quality]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Alphonso-${{ github.sha }}-x64-setup
          path: src-tauri/target/release/bundle/nsis/Alphonso_*_x64-setup.exe
          retention-days: 14

  secrets-scan:
    name: Secrets Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  doc-freshness:
    name: Doc Count Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify doc counts are fresh
        run: npm run verify:docs

  e2e:
    name: Playwright E2E Smoke Test
    needs: [test]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          CI: true
