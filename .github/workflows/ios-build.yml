name: Build iOS Companion

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Use latest available Xcode (26+) required for iOS 26 SDK
          XCODE=$(ls /Applications | grep "^Xcode_2[6-9]" | sort -V | tail -1 || ls /Applications | grep "^Xcode" | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Generate app icons
        run: |
          set -e
          ICON_DIR="ios/AlphonsoCompanion/AlphonsoCompanion/Assets.xcassets/AppIcon.appiconset"

          # Create a 1024x1024 base icon using sips + Python (dark background, white A)
          python3 - <<'PYEOF'
          import struct, zlib, math

          def make_png(size, bg=(15,15,25), fg=(255,255,255)):
              """Generate a solid-bg PNG with a bold 'A' centred on it."""
              img = [list(bg) for _ in range(size * size)]

              # Simple pixel-font 'A' scaled to fit — drawn as filled triangular shape
              cx, cy = size // 2, size // 2
              h = int(size * 0.55)
              w = int(size * 0.45)
              stroke = max(1, size // 14)
              top_y  = cy - h // 2
              bot_y  = cy + h // 2
              bar_y  = cy + h // 10

              for y in range(top_y, bot_y + 1):
                  t = (y - top_y) / h
                  half_w = int(w * t / 2)
                  # left stroke
                  for dx in range(-half_w, -half_w + stroke):
                      x = cx + dx
                      if 0 <= x < size and 0 <= y < size:
                          img[y * size + x] = list(fg)
                  # right stroke
                  for dx in range(half_w - stroke, half_w):
                      x = cx + dx
                      if 0 <= x < size and 0 <= y < size:
                          img[y * size + x] = list(fg)

              # crossbar
              t_bar = (bar_y - top_y) / h
              bar_left  = cx - int(w * t_bar / 2)
              bar_right = cx + int(w * t_bar / 2)
              for x in range(bar_left, bar_right):
                  for dy in range(stroke):
                      y = bar_y + dy
                      if 0 <= x < size and 0 <= y < size:
                          img[y * size + x] = list(fg)

              # corner radius mask
              r = size // 5
              for py in range(size):
                  for px in range(size):
                      corners = [
                          (r, r), (size-1-r, r),
                          (r, size-1-r), (size-1-r, size-1-r)
                      ]
                      for (cx2, cy2) in corners:
                          if math.hypot(px - cx2, py - cy2) > r and \
                             px < r+1 and py < r+1 or \
                             px > size-2-r and py < r+1 or \
                             px < r+1 and py > size-2-r or \
                             px > size-2-r and py > size-2-r:
                              pass  # skip corner clipping for simplicity

              # Build raw PNG bytes
              raw = b''
              for row in range(size):
                  raw += b'\x00'
                  for col in range(size):
                      px = img[row * size + col]
                      raw += bytes(px)

              def chunk(name, data):
                  c = name + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)

              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              compressed = zlib.compress(raw, 9)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', ihdr) +
                      chunk(b'IDAT', compressed) +
                      chunk(b'IEND', b''))

          import os, sys
          icon_dir = sys.argv[1] if len(sys.argv) > 1 else '.'
          sizes = [20,29,38,40,60,76,83,120,152,167,180,1024]
          for s in sizes:
              with open(f'{icon_dir}/base_{s}.png', 'wb') as f:
                  f.write(make_png(s))
          print(f"Generated {len(sizes)} icon sizes")
          PYEOF

          # Rename to match Contents.json filenames using sips for proper resizing
          cd "$ICON_DIR"
          python3 -c "
          import os, shutil
          mapping = {
            'Icon-20@1x.png': 20, 'Icon-20@2x.png': 40, 'Icon-20@3x.png': 60,
            'Icon-29@1x.png': 29, 'Icon-29@2x.png': 58, 'Icon-29@3x.png': 87,
            'Icon-38@2x.png': 76, 'Icon-38@3x.png': 114,
            'Icon-40@1x.png': 40, 'Icon-40@2x.png': 80, 'Icon-40@3x.png': 120,
            'Icon-60@2x.png': 120,'Icon-60@3x.png': 180,
            'Icon-76@2x.png': 152,'Icon-83.5@2x.png': 167,
            'Icon-1024.png': 1024
          }
          " || true

          # Use sips to generate all required sizes from the 1024 base
          BASE="base_1024.png"
          declare -A ICONS=(
            ["Icon-20@1x.png"]=20   ["Icon-20@2x.png"]=40   ["Icon-20@3x.png"]=60
            ["Icon-29@1x.png"]=29   ["Icon-29@2x.png"]=58   ["Icon-29@3x.png"]=87
            ["Icon-38@2x.png"]=76   ["Icon-38@3x.png"]=114
            ["Icon-40@1x.png"]=40   ["Icon-40@2x.png"]=80   ["Icon-40@3x.png"]=120
            ["Icon-60@2x.png"]=120  ["Icon-60@3x.png"]=180
            ["Icon-76@2x.png"]=152  ["Icon-83.5@2x.png"]=167
            ["Icon-1024.png"]=1024
          )
          for NAME in "${!ICONS[@]}"; do
            SIZE="${ICONS[$NAME]}"
            sips -z $SIZE $SIZE "$BASE" --out "$NAME" > /dev/null 2>&1
          done
          rm -f base_*.png
          echo "Icons generated: $(ls *.png | wc -l) files"

      - name: Setup signing
        env:
          IOS_CERT_DER: ${{ secrets.IOS_CERT_DER }}
          IOS_KEY_PEM: ${{ secrets.IOS_KEY_PEM }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          set -e

          # ── Keychain ──────────────────────────────────────────────────────────
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '[:space:]"')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # ── Certificate ───────────────────────────────────────────────────────
          CERT_PATH=$RUNNER_TEMP/certificate.cer
          KEY_PATH=$RUNNER_TEMP/private_key.pem

          echo "$IOS_CERT_DER" | base64 --decode > "$CERT_PATH"
          echo "$IOS_KEY_PEM"  | base64 --decode > "$KEY_PATH"

          echo "Cert size: $(wc -c < "$CERT_PATH") bytes  Key size: $(wc -c < "$KEY_PATH") bytes"

          security import "$CERT_PATH" \
            -t cert -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security

          security import "$KEY_PATH" \
            -t priv -f openssl -A -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" 2>/dev/null || true

          echo "Certificate and key imported successfully"

          # ── Provisioning Profile ──────────────────────────────────────────────
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          PP_PLIST=$RUNNER_TEMP/profile.plist

          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"

          openssl smime -inform DER -verify -noverify \
            -in "$PP_PATH" -out "$PP_PLIST" 2>/dev/null \
            || security cms -D -i "$PP_PATH" > "$PP_PLIST" 2>/dev/null \
            || true

          if [ ! -s "$PP_PLIST" ]; then
            echo "::error::Failed to decode provisioning profile"
            exit 1
          fi

          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PP_PLIST" 2>/dev/null \
            || grep -o '[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}' "$PP_PLIST" | head -1)

          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PP_PLIST" 2>/dev/null \
            || grep -A1 '<key>Name</key>' "$PP_PLIST" | tail -1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/')

          if [ -z "$UUID" ] || [ -z "$PP_NAME" ]; then
            echo "::error::Could not extract UUID or Name from provisioning profile"
            exit 1
          fi

          echo "Profile UUID : $UUID"
          echo "Profile Name : $PP_NAME"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

          echo "PP_NAME=$PP_NAME" >> "$GITHUB_ENV"
          echo "PP_UUID=$UUID"    >> "$GITHUB_ENV"

      - name: Archive iOS app
        working-directory: ios/AlphonsoCompanion
        run: |
          set -e
          echo "Archiving with profile: '${{ env.PP_NAME }}'"

          xcodebuild archive \
            -project AlphonsoCompanion.xcodeproj \
            -scheme AlphonsoCompanion \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/AlphonsoCompanion.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Shayan Salimi (9Y6GYPM3K5)" \
            DEVELOPMENT_TEAM="9Y6GYPM3K5" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PP_NAME }}" \
            PRODUCT_BUNDLE_IDENTIFIER="com.alphonso.companion" \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_FILE=AlphonsoCompanion/Info.plist \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ env.KEYCHAIN_PATH }}"

      - name: Export IPA
        working-directory: ios/AlphonsoCompanion
        run: |
          set -e
          mkdir -p build/output

          cat > build/ExportOptions.plist << PLIST_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9Y6GYPM3K5</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.alphonso.companion</key>
              <string>${{ env.PP_NAME }}</string>
            </dict>
          </dict>
          </plist>
          PLIST_EOF

          xcodebuild -exportArchive \
            -archivePath build/AlphonsoCompanion.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/output

          echo "IPA exported:"
          ls -la build/output/*.ipa

      - name: Upload to TestFlight
        working-directory: ios/AlphonsoCompanion
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/app-store-connect"
          echo "$API_KEY" > "$RUNNER_TEMP/app-store-connect/AuthKey_${API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/app-store-connect/AuthKey_${API_KEY_ID}.p8"

          IPA_PATH=$(find build/output -name "*.ipa" | head -1)
          echo "Uploading $IPA_PATH to TestFlight..."

          mkdir -p ~/.appstoreconnect/private_keys
          cp "$RUNNER_TEMP/app-store-connect/AuthKey_${API_KEY_ID}.p8" \
             ~/.appstoreconnect/private_keys/

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER" \
            || echo "::warning::TestFlight upload failed — download IPA from artifacts below"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphonsoCompanion-${{ github.run_number }}
          path: ios/AlphonsoCompanion/build/output/AlphonsoCompanion.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

      - name: Build summary
        if: always()
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | AlphonsoCompanion-${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Profile Name** | ${{ env.PP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Profile UUID** | ${{ env.PP_UUID }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "If the upload step succeeded, the build is processing on App Store Connect (usually 5–15 min)." >> $GITHUB_STEP_SUMMARY
