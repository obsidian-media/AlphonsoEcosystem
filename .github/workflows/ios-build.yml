name: Build iOS Companion

on:
  push:
    branches: [IOSCOMPANION]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate if available
          if [ -n "$CERTIFICATE_BASE64" ]; then
            CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
            echo -n "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
            if security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" 2>&1; then
              echo "Certificate imported successfully"
              security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
              security list-keychain -d user -s "$KEYCHAIN_PATH"
            else
              echo "::warning::Certificate import failed — continuing with ad-hoc signing"
            fi
          else
            echo "::warning::No certificate provided — using ad-hoc signing"
          fi

          # Install provisioning profile if available
          if [ -n "$PROVISION_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PP_PATH"))
            cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          fi

      - name: Archive iOS app
        working-directory: ios/AlphonsoCompanion
        run: |
          xcodebuild archive \
            -project AlphonsoCompanion.xcodeproj \
            -scheme AlphonsoCompanion \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/AlphonsoCompanion.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | grep -E "error:|warning:|❌|ARCHIVE"

      - name: Export IPA
        working-directory: ios/AlphonsoCompanion
        run: |
          mkdir -p build/output
          
          cat > ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9Y6GYPM3K5</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST_EOF

          xcodebuild -exportArchive \
            -archivePath build/AlphonsoCompanion.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/output \
            | xcpretty || echo "Export failed — archive available as artifact"

      - name: Upload to TestFlight
        if: success()
        working-directory: ios/AlphonsoCompanion
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/app-store-connect"
          echo -n "$APP_STORE_CONNECT_API_KEY" > "$RUNNER_TEMP/app-store-connect/api_key.p8"
          
          xcrun altool --upload-app \
            --type ios \
            --file build/output/AlphonsoCompanion.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER" \
            --apiKeyPath "$RUNNER_TEMP/app-store-connect/api_key.p8" || echo "TestFlight upload skipped (altool may be unavailable)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphonsoCompanion-${{ github.run_number }}
          path: |
            ios/AlphonsoCompanion/build/output/*.ipa
            ios/AlphonsoCompanion/build/AlphonsoCompanion.xcarchive
          retention-days: 7

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Build summary
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** AlphonsoCompanion-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on iPhone (No Mac Required)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option 1: AltStore (Windows)**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download .ipa from Artifacts section above" >> $GITHUB_STEP_SUMMARY
          echo "2. Install [AltStore](https://altstore.io) on your Windows PC" >> $GITHUB_STEP_SUMMARY
          echo "3. Connect iPhone via USB, open AltStore, install the .ipa" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option 2: TestFlight (Wireless)**" >> $GITHUB_STEP_SUMMARY
          echo "1. If TestFlight secrets are set, .ipa was uploaded automatically" >> $GITHUB_STEP_SUMMARY
          echo "2. Install TestFlight app on iPhone" >> $GITHUB_STEP_SUMMARY
          echo "3. Check email for invitation, install from TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option 3: Sideloadly (Windows)**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download [Sideloadly](https://sideloadly.io)" >> $GITHUB_STEP_SUMMARY
          echo "2. Connect iPhone, drag .ipa into Sideloadly" >> $GITHUB_STEP_SUMMARY
