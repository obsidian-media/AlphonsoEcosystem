name: Build iOS Companion

on:
  push:
    branches: [IOSCOMPANION]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup signing
        env:
          IOS_CERT_PEM: ${{ secrets.IOS_CERT_PEM }}
          IOS_KEY_PEM: ${{ secrets.IOS_KEY_PEM }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          set -e

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode PEM files from secrets
          CERT_PATH=$RUNNER_TEMP/cert.pem
          KEY_PATH=$RUNNER_TEMP/key.pem

          echo "$IOS_CERT_PEM" | base64 -D > "$CERT_PATH"
          echo "$IOS_KEY_PEM" | base64 -D > "$KEY_PATH"

          echo "Cert size: $(wc -c < "$CERT_PATH") bytes, Key size: $(wc -c < "$KEY_PATH") bytes"

          # Create .p12 on macOS runner using its own OpenSSL with -legacy flag
          P12_PATH=$RUNNER_TEMP/certificate.p12
          cat "$KEY_PATH" "$CERT_PATH" | openssl pkcs12 -export \
            -out "$P12_PATH" \
            -passout pass:"$CERTIFICATE_PASSWORD" \
            -legacy

          echo "P12 size: $(wc -c < "$P12_PATH") bytes"

          # Import .p12 into keychain
          security import "$P12_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "Certificate imported successfully"

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE" | base64 -D > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PP_PATH"))
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Provisioning profile installed: $UUID"

      - name: Archive iOS app
        working-directory: ios/AlphonsoCompanion
        run: |
          set -e
          xcodebuild archive \
            -project AlphonsoCompanion.xcodeproj \
            -scheme AlphonsoCompanion \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/AlphonsoCompanion.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution: Shayan Salimi (9Y6GYPM3K5)" \
            DEVELOPMENT_TEAM="9Y6GYPM3K5" \
            PROVISIONING_PROFILE_SPECIFIER="Alphonso_iOS" \
            PRODUCT_BUNDLE_IDENTIFIER="com.alphonso.companion"

      - name: Export IPA
        working-directory: ios/AlphonsoCompanion
        run: |
          set -e
          mkdir -p build/output

          cat > build/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9Y6GYPM3K5</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.alphonso.companion</key>
              <string>Alphonso_iOS</string>
            </dict>
          </dict>
          </plist>
          PLIST_EOF

          xcodebuild -exportArchive \
            -archivePath build/AlphonsoCompanion.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/output

          echo "IPA exported:"
          ls -la build/output/*.ipa

      - name: Upload to TestFlight
        working-directory: ios/AlphonsoCompanion
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Write API key to file
          mkdir -p "$RUNNER_TEMP/app-store-connect"
          echo "$API_KEY" > "$RUNNER_TEMP/app-store-connect/AuthKey_${API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/app-store-connect/AuthKey_${API_KEY_ID}.p8"

          echo "Uploading to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file build/output/AlphonsoCompanion.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER" \
            --apiKeyPath "$RUNNER_TEMP/app-store-connect/AuthKey_${API_KEY_ID}.p8" \
            || echo "::warning::TestFlight upload failed — download IPA from artifacts"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphonsoCompanion-${{ github.run_number }}
          path: ios/AlphonsoCompanion/build/output/AlphonsoCompanion.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Build summary
        if: always()
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** AlphonsoCompanion-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "If the upload step succeeded, the build is processing on App Store Connect." >> $GITHUB_STEP_SUMMARY
          echo "It usually takes 5-15 minutes to appear in TestFlight." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manual Install (if TestFlight upload fails)" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the .ipa from Artifacts above" >> $GITHUB_STEP_SUMMARY
          echo "2. Use [AltStore](https://altstore.io) or [Sideloadly](https://sideloadly.io) to install" >> $GITHUB_STEP_SUMMARY
