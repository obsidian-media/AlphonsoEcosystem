name: Build iOS Companion

on:
  push:
    branches: [IOSCOMPANION]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          if [ -n "$CERTIFICATE_BASE64" ]; then
            CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
            echo -n "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
            if security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"; then
              echo "Certificate imported successfully"
              security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
              security list-keychain -d user -s "$KEYCHAIN_PATH"
            else
              echo "::warning::Certificate import failed — continuing with ad-hoc signing"
            fi
          else
            echo "::warning::No certificate provided — using ad-hoc signing"
          fi

          if [ -n "$PROVISION_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PP_PATH"))
            cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          fi

      - name: Build iOS app
        working-directory: ios/AlphonsoCompanion
        run: |
          xcodebuild build \
            -project AlphonsoCompanion.xcodeproj \
            -scheme AlphonsoCompanion \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        working-directory: ios/AlphonsoCompanion
        run: |
          BUILD_DIR=$(xcodebuild -project AlphonsoCompanion.xcodeproj \
            -scheme AlphonsoCompanion \
            -configuration Release \
            -showBuildSettings 2>/dev/null | grep -m1 "BUILT_PRODUCTS_DIR" | awk '{print $3}')

          APP_PATH=$(find "$BUILD_DIR" -name "AlphonsoCompanion.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "::error::AlphonsoCompanion.app not found in build directory"
            exit 1
          fi

          mkdir -p build/output
          cd build/output
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r AlphonsoCompanion.ipa Payload/
          rm -rf Payload
          echo "IPA created: $(pwd)/AlphonsoCompanion.ipa"
          ls -la AlphonsoCompanion.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphonsoCompanion-${{ github.run_number }}
          path: ios/AlphonsoCompanion/build/output/AlphonsoCompanion.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Build summary
        if: always()
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** AlphonsoCompanion-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on iPhone (No Mac Required)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option 1: AltStore (Windows)**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download .ipa from Artifacts section above" >> $GITHUB_STEP_SUMMARY
          echo "2. Install [AltStore](https://altstore.io) on your Windows PC" >> $GITHUB_STEP_SUMMARY
          echo "3. Connect iPhone via USB, open AltStore, install the .ipa" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option 2: Sideloadly (Windows)**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download [Sideloadly](https://sideloadly.io)" >> $GITHUB_STEP_SUMMARY
          echo "2. Connect iPhone, drag .ipa into Sideloadly" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option 3: TestFlight (via Mac)**" >> $GITHUB_STEP_SUMMARY
          echo "1. On a Mac, use Xcode or Transporter to upload the .ipa" >> $GITHUB_STEP_SUMMARY
