name: Build iOS Companion

on:
  push:
    branches: [IOSCOMPANION]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Setup signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          if [ -n "$CERTIFICATE_BASE64" ]; then
            CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
            echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
            security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"
          fi

          # Install provisioning profile
          if [ -n "$PROVISION_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PP_PATH"))
            cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          fi

      - name: Build iOS app
        working-directory: ios/AlphonsoCompanion
        run: |
          xcodebuild clean build \
            -project AlphonsoCompanion.xcodeproj \
            -scheme AlphonsoCompanion \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_CERTIFICATE_NAME || 'Apple Development' }}" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_DEVELOPMENT_TEAM }}" \
            PRODUCT_BUNDLE_IDENTIFIER="com.alphonso.companion" \
            | xcpretty

      - name: Export IPA
        working-directory: ios/AlphonsoCompanion
        run: |
          mkdir -p build/output
          
          # Create export options
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_DEVELOPMENT_TEAM }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/AlphonsoCompanion.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/output \
            | xcpretty

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphonsoCompanion-${{ github.run_number }}
          path: ios/AlphonsoCompanion/build/output/*.ipa
          retention-days: 7

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Build summary
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** AlphonsoCompanion-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**To install on iPhone:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the .ipa from the Artifacts section" >> $GITHUB_STEP_SUMMARY
          echo "2. On a Mac: \`ios-deploy --bundle YourApp.ipa\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Or use Apple Configurator 2 to sideload" >> $GITHUB_STEP_SUMMARY
          echo "4. Or upload to TestFlight for wireless install" >> $GITHUB_STEP_SUMMARY
