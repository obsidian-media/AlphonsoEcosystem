name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Tauri App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: Alphonso-Windows
            bundle_targets: nsis
          - os: macos-14
            target: universal-apple-darwin
            artifact_name: Alphonso-macOS
            bundle_targets: dmg,app
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: Alphonso-Linux
            bundle_targets: deb,AppImage
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install webkit2gtk app-indicator3 librsvg patchelf || true

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Alphonso ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundle-targets ${{ matrix.bundle_targets }}

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  notarize-macos:
    name: Notarize macOS App
    needs: build
    if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Alphonso-macOS
          path: artifacts/

      - name: Notarize DMG
        run: |
          xcrun notarytool submit artifacts/*.dmg \
            --apple-id ${{ secrets.APPLE_ID }} \
            --team-id ${{ secrets.APPLE_TEAM_ID }} \
            --password ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }} \
            --wait

      - name: Staple DMG
        run: xcrun stapler staple artifacts/*.dmg

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v4
        with:
          name: Alphonso-macOS-notarized
          path: artifacts/*.dmg

  create-release:
    name: Create GitHub Release
    needs: [build, notarize-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Alphonso-Windows/*.exe
            artifacts/Alphonso-macOS-notarized/*.dmg
            artifacts/Alphonso-Linux/*.deb
            artifacts/Alphonso-Linux/*.AppImage
          draft: true
          generate_release_notes: true